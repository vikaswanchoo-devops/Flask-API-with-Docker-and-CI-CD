name: Build, Run, and Push Docker Image

on:
  workflow_dispatch:   # allows manual runs
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/simple-api:latest

      - name: Run container for verification
        run: |
          docker run -d -p 5000:5000 --name simple-api-test ${{ secrets.DOCKER_USERNAME }}/simple-api:latest
          sleep 10
          docker ps
          docker logs simple-api-test
          curl -f http://localhost:5000 || (echo "Container test failed" && exit 1)

      - name: Clean up
        run: |
          docker stop simple-api-test
          docker rm simple-api-test
